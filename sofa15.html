<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جذور - صوفا ميني جوزور</title>
    <link rel="stylesheet" href="product-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-container">
        <div class="product-image-banner">
            <a href="sofa.html" class="back-arrow-btn">
                <i class="fa-solid fa-chevron-right"></i>
            </a>
            <img src="img.k/png15.jpeg" alt="صوفا ميني جوزور" class="product-bg-img">
        </div>
        <div class="product-details-card">
            <h1 class="product-title">صوفا ميني جوزور</h1>
            <span class="product-price">540$</span>
            <div class="heritage-divider">
                <span class="line-segment"></span>
                <img src="img/png4.png" class="heritage-icon" alt="نقشة تطريز رام الله">
                <span class="line-segment"></span>
            </div>
            <p class="product-description">
                صوفا صغيرة وعصرية جداً مخصصة للمساحات المحدودة وغرف القراءة، تجمع بين بساطة الأثاث الحديث وعمق الهوية الفلسطينية عبر وسائد مطرزة بنقوش ناعمة وأنيقة.
            </p>
            <div class="info-grid">
                <div class="info-column">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-circle-plus"></i>
                    </div>
                    <h4>الشحن</h4>
                    <p>شحن مجاني داخل فلسطين</p>
                </div>
                <div class="vertical-divider"></div>
                <div class="info-column">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-box-open"></i>
                    </div>
                    <h4>وقت التصنيع</h4>
                    <p>4-5 أسابيع</p>
                </div>
            </div>
            <button class="ar-button">
                <span>عرض في غرفتي</span>
                <i class="fa-solid fa-expand"></i>
            </button>
        </div>
    </div>
</body>
</html>
